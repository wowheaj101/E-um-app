<!-- @dsCard group="Wanted App" viewport="430x780" name="Wanted — Jobs App" subtitle="Interactive iOS recreation: feed → job detail → apply" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wanted · Jobs</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-sans); background: #e7e8ea; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  .phone { width: 375px; height: 812px; background: var(--background-normal); border-radius: 46px; box-shadow: 0 1px 0 4px #1b1c1e, 0 0 0 6px #303236, 0 30px 70px rgba(0,0,0,0.28); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { height: 50px; flex-shrink: 0; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 6px; font-size: 15px; font-weight: 600; color: var(--label-normal); position: relative; z-index: 5; background: var(--background-normal); }
  .statusbar .right { display: flex; align-items: center; gap: 6px; }
  .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 32px; background: #000; border-radius: 0 0 20px 20px; z-index: 6; }
  .screen { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }
  .tabbar { flex-shrink: 0; height: 58px; display: flex; background: var(--background-normal); box-shadow: inset 0 1px 0 var(--line-alternative); }
  .home-indicator { flex-shrink: 0; height: 22px; display: flex; align-items: center; justify-content: center; background: var(--background-normal); }
  .home-indicator span { width: 134px; height: 5px; border-radius: 9999px; background: var(--label-normal); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; border: none; background: transparent; font-family: var(--font-sans); }
  .tab span { font-size: 10px; font-weight: 600; letter-spacing: 0.01em; }
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--label-assistive); }
  .toast-host { position: absolute; left: 0; right: 0; bottom: 92px; display: flex; justify-content: center; pointer-events: none; z-index: 20; }
  .toast-anim { animation: toastin 0.28s var(--ease-emphasized); }
  @keyframes toastin { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="JobCard.jsx"></script>
<script type="text/babel" src="TopBar.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="JobDetailScreen.jsx"></script>
<script type="text/babel">
  const { Icon } = window.WantedDesignSystem_3ed5bb;
  const TABS = [
    { key: "home", icon: "home", label: "홈" },
    { key: "jobs", icon: "search", label: "채용" },
    { key: "social", icon: "message", label: "커뮤니티" },
    { key: "my", icon: "person", label: "MY" },
  ];

  function StatusBar() {
    return (
      <div className="statusbar">
        <div className="notch"></div>
        <span>9:41</span>
        <span className="right">
          <svg width="18" height="12" viewBox="0 0 18 12"><g fill="var(--label-normal)"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="5" y="4" width="3" height="8" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1"/></g></svg>
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><path d="M8.5 2.6c2 0 3.9.8 5.3 2.1l1.4-1.5A9.4 9.4 0 0 0 8.5.6 9.4 9.4 0 0 0 2 3.2l1.4 1.5A7.4 7.4 0 0 1 8.5 2.6Z" fill="var(--label-normal)"/><path d="M8.5 6.1c1 0 2 .4 2.7 1.1l1.4-1.5a6 6 0 0 0-8.2 0l1.4 1.5A3.9 3.9 0 0 1 8.5 6.1Z" fill="var(--label-normal)"/><circle cx="8.5" cy="10" r="1.6" fill="var(--label-normal)"/></svg>
          <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="0.5" y="1" width="21" height="11" rx="3" stroke="var(--label-normal)" opacity="0.4"/><rect x="2" y="2.5" width="18" height="8" rx="1.5" fill="var(--label-normal)"/><rect x="23" y="4.5" width="1.5" height="4" rx="0.75" fill="var(--label-normal)" opacity="0.5"/></svg>
        </span>
      </div>
    );
  }

  function TabBar({ active, onChange }) {
    return (
      <div className="tabbar">
        {TABS.map((t) => {
          const on = active === t.key;
          return (
            <button key={t.key} className="tab" onClick={() => onChange(t.key)}>
              <Icon name={t.icon} size={24} color={on ? "var(--primary-normal)" : "var(--label-assistive)"} />
              <span style={{ color: on ? "var(--primary-normal)" : "var(--label-assistive)" }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    );
  }

  function App() {
    const [tab, setTab] = React.useState("home");
    const [openId, setOpenId] = React.useState(null);
    const [bookmarks, setBookmarks] = React.useState(() => new Set());
    const [toast, setToast] = React.useState(null);

    const toggleBookmark = (id) => setBookmarks((prev) => {
      const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
    });
    const showToast = (node) => { setToast(node); clearTimeout(window.__tt); window.__tt = setTimeout(() => setToast(null), 2600); };

    const job = window.WANTED_JOBS.find((j) => j.id === openId);
    const { Toast } = window.WantedDesignSystem_3ed5bb;

    let body;
    if (openId && job) {
      body = (
        <window.JobDetailScreen
          job={job}
          bookmarked={bookmarks.has(job.id)}
          toggleBookmark={() => { toggleBookmark(job.id); }}
          onBack={() => setOpenId(null)}
          onApply={() => { setOpenId(null); showToast(<Toast status="positive" action="확인">지원서가 제출되었어요</Toast>); }}
        />
      );
    } else if (tab === "home") {
      body = (
        <React.Fragment>
          <window.TopBar onSearch={() => setTab("jobs")} />
          <div className="scroll">
            <window.HomeScreen bookmarks={bookmarks} toggleBookmark={toggleBookmark} openJob={(id) => setOpenId(id)} />
          </div>
        </React.Fragment>
      );
    } else {
      const labels = { jobs: "채용 검색", social: "커뮤니티", my: "MY 원티드" };
      body = (
        <React.Fragment>
          <window.TopBar onSearch={() => {}} />
          <div className="scroll">
            <div className="empty">
              <Icon name={TABS.find((t) => t.key === tab).icon} size={40} color="var(--label-disable)" />
              <span className="wt-body2">{labels[tab]} 화면</span>
            </div>
          </div>
        </React.Fragment>
      );
    }

    return (
      <div className="phone">
        <StatusBar />
        <div className="screen">{body}</div>
        {!openId ? <TabBar active={tab} onChange={(k) => { setTab(k); setOpenId(null); }} /> : null}
        <div className="home-indicator"><span></span></div>
        {toast ? <div className="toast-host"><div className="toast-anim">{toast}</div></div> : null}
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
