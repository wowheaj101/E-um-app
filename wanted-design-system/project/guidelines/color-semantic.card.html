<!-- @dsCard group="Colors" viewport="700x170" name="Semantic Surfaces" subtitle="Background, line & fill on light theme" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 24px; }
  
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .card{border-radius:12px;padding:14px;box-shadow:inset 0 0 0 1px var(--line-alternative);}
  .dot{width:100%;height:40px;border-radius:8px;margin-bottom:10px;box-shadow:inset 0 0 0 1px var(--line-normal);}
  .t{font-size:12px;font-weight:600;} .v{font-size:10px;color:var(--label-alternative);margin-top:2px;}

</style></head><body><div class="wrap">
  <div class="grid">
    <div class="card"><div class="dot" style="background:var(--background-normal)"></div><div class="t">background-normal</div><div class="v">#FFFFFF</div></div>
    <div class="card"><div class="dot" style="background:var(--background-normal-alternative)"></div><div class="t">bg-alternative</div><div class="v">cool-neutral-99</div></div>
    <div class="card"><div class="dot" style="background:var(--fill-normal)"></div><div class="t">fill-normal</div><div class="v">grey 8%</div></div>
    <div class="card"><div class="dot" style="background:var(--fill-strong)"></div><div class="t">fill-strong</div><div class="v">grey 16%</div></div>
    <div class="card"><div class="dot" style="background:var(--line-normal)"></div><div class="t">line-normal</div><div class="v">grey 22%</div></div>
    <div class="card"><div class="dot" style="background:var(--line-neutral)"></div><div class="t">line-neutral</div><div class="v">grey 16%</div></div>
    <div class="card"><div class="dot" style="background:var(--inverse-background)"></div><div class="t">inverse-bg</div><div class="v">cool-neutral-15</div></div>
    <div class="card"><div class="dot" style="background:var(--primary-tint)"></div><div class="t">primary-tint</div><div class="v">blue-95</div></div>
  </div></div></body></html>
