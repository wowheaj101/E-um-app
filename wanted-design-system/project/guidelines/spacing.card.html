<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing Scale" subtitle="4px base · used for gap & padding" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 26px 24px; }
  
  .row{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
  .name{width:78px;font-size:12px;color:var(--label-alternative);font-weight:600;}
  .bar{height:16px;background:var(--primary-normal);border-radius:4px;}
  .px{font-size:11px;color:var(--label-assistive);}

</style></head><body><div class="wrap">
  <div class="row"><span class="name">space-4</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div><div class="row"><span class="name">space-8</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div><div class="row"><span class="name">space-12</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div><div class="row"><span class="name">space-16</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div><div class="row"><span class="name">space-20</span><span class="bar" style="width:20px"></span><span class="px">20px</span></div><div class="row"><span class="name">space-24</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div><div class="row"><span class="name">space-32</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div><div class="row"><span class="name">space-48</span><span class="bar" style="width:48px"></span><span class="px">48px</span></div><div class="row"><span class="name">space-64</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
</div></body></html>
