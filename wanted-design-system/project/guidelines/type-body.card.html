<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 26px 24px; }
  
  .spec{color:var(--label-assistive);font-size:11px;font-weight:600;letter-spacing:0.02em;display:inline-block;width:130px;}
  .line{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--line-alternative);}
  .samp{flex:1;color:var(--label-normal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

</style></head><body><div class="wrap">
  <div class="line"><span class="spec">Heading 1 · 22</span><span class="samp wt-heading1">직무별 채용관</span></div>
  <div class="line"><span class="spec">Heading 2 · 20</span><span class="samp wt-heading2">관심 기업의 새 소식</span></div>
  <div class="line"><span class="spec">Headline 1 · 18</span><span class="samp wt-headline1">프론트엔드 개발자 (3년 이상)</span></div>
  <div class="line"><span class="spec">Body 1 · 16</span><span class="samp wt-body1">합류하면 함께 풀어갈 문제를 소개해요. The work you'll do.</span></div>
  <div class="line"><span class="spec">Body 2 · 15</span><span class="samp wt-body2">서울 강남구 · 경력 3~7년 · 정규직</span></div>
  <div class="line"><span class="spec">Label 1 · 14</span><span class="samp wt-label1">지원 마감 D-5 · 합격 축하금 50만원</span></div>
  <div class="line"><span class="spec">Label 2 · 13</span><span class="samp wt-label2">최근 일주일 320명 지원</span></div>
  <div class="line"><span class="spec">Caption 1 · 12</span><span class="samp wt-caption1">2시간 전 업데이트 · 조회 1.2만</span></div>
</div></body></html>
