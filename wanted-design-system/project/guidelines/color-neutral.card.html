<!-- @dsCard group="Colors" viewport="700x200" name="Neutral — Cool Grey" subtitle="UI greys + label/surface tokens" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 24px; }
  
  .ramp { display:grid; grid-template-columns:repeat(10,1fr); border-radius:12px; overflow:hidden; box-shadow:inset 0 0 0 1px var(--line-alternative); }
  .sw{height:56px;display:flex;align-items:flex-end;padding:5px;box-sizing:border-box;}
  .sw span{font-size:9px;font-weight:600;}
  .row{display:flex;gap:10px;margin-top:14px;}
  .chip{flex:1;border-radius:10px;padding:10px 12px;box-shadow:inset 0 0 0 1px var(--line-alternative);}
  .chip .t{font-size:12px;font-weight:600;} .chip .v{font-size:10px;color:var(--label-alternative);margin-top:2px;}
  .dot{width:20px;height:20px;border-radius:6px;margin-bottom:7px;box-shadow:inset 0 0 0 1px var(--line-normal);}

</style></head><body><div class="wrap">
  <div class="ramp" id="ramp"></div>
  <div class="row">
    <div class="chip"><div class="dot" style="background:var(--label-normal)"></div><div class="t">label-normal</div><div class="v">#171717</div></div>
    <div class="chip"><div class="dot" style="background:var(--label-neutral)"></div><div class="t">label-neutral</div><div class="v">2E2F33 / 88%</div></div>
    <div class="chip"><div class="dot" style="background:var(--label-alternative)"></div><div class="t">label-alternative</div><div class="v">37383C / 61%</div></div>
    <div class="chip"><div class="dot" style="background:var(--label-assistive)"></div><div class="t">label-assistive</div><div class="v">37383C / 28%</div></div>
    <div class="chip"><div class="dot" style="background:var(--background-normal-alternative)"></div><div class="t">bg-alternative</div><div class="v">cool-neutral-99</div></div>
  </div>
  <script>
    const s=[["99","#f7f7f8"],["97","#eaebec"],["95","#dbdcdf"],["90","#c2c4c8"],["70","#989ba2"],["50","#70737c"],["40","#5a5c63"],["25","#37383c"],["15","#1b1c1e"],["10","#171719"]];
    document.getElementById('ramp').innerHTML=s.map(([k,h])=>{const d=parseInt(k)<=60;return '<div class="sw" style="background:'+h+'"><span style="color:'+(d?'#fff':'#46474c')+'">'+k+'</span></div>';}).join('');
  </script></div></body></html>
