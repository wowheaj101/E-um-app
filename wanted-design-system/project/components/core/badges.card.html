<!-- @dsCard group="Components" viewport="700x260" name="Chips, Badges & Avatars" subtitle="Chip · ContentBadge · Badge · Avatar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 28px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { width: 72px; font-size: 11px; color: var(--label-alternative); letter-spacing: 0.02em; }
  .group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Chip, ContentBadge, Badge, Avatar, Icon } = window.WantedDesignSystem_3ed5bb;
  function Demo() {
    const [sel, setSel] = React.useState("all");
    return (
      <div>
        <div className="row"><span className="lbl">Chip</span><div className="group">
          {[["all","전체"],["dev","개발"],["design","디자인"],["pm","기획"]].map(([k,v]) => (
            <Chip key={k} selected={sel===k} onClick={() => setSel(k)}>{v}</Chip>
          ))}
          <Chip leadingIcon={<Icon name="location" size={14} />}>서울</Chip>
          <Chip trailingIcon={<Icon name="chevronDown" size={14} />}>경력</Chip>
        </div></div>
        <div className="row"><span className="lbl">ContentBadge</span><div className="group">
          <ContentBadge tone="blue">정규직</ContentBadge>
          <ContentBadge tone="green">합격</ContentBadge>
          <ContentBadge tone="violet">신입</ContentBadge>
          <ContentBadge tone="orange">마감임박</ContentBadge>
          <ContentBadge tone="red" variant="solid">D-3</ContentBadge>
          <ContentBadge tone="neutral">스타트업</ContentBadge>
        </div></div>
        <div className="row"><span className="lbl">Badge</span><div className="group">
          <span style={{ position: "relative", display: "inline-flex" }}>
            <Icon name="bell" size={24} color="var(--label-neutral)" />
            <span style={{ position: "absolute", top: -4, right: -6 }}><Badge count={5} /></span>
          </span>
          <span style={{ position: "relative", display: "inline-flex" }}>
            <Icon name="message" size={24} color="var(--label-neutral)" />
            <span style={{ position: "absolute", top: -2, right: -2 }}><Badge dot /></span>
          </span>
          <Badge count={128} tone="primary" />
        </div></div>
        <div className="row"><span className="lbl">Avatar</span><div className="group">
          <Avatar name="토스" size="lg" />
          <Avatar name="네이버" />
          <Avatar shape="circle" name="김원" size="md" />
          <Avatar shape="circle" name="이디" size="sm" />
        </div></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
