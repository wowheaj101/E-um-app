<!-- @dsCard group="Components" viewport="700x240" name="Tabs & Segmented Control" subtitle="Section navigation patterns" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--background-normal); color: var(--label-normal); }
  .wrap { padding: 28px; display: flex; flex-direction: column; gap: 26px; }
  .lbl { font-size: 11px; color: var(--label-alternative); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="wrap"><div id="root"></div></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Tabs, SegmentedControl } = window.WantedDesignSystem_3ed5bb;
  function Demo() {
    const [tab, setTab] = React.useState("applied");
    const [sort, setSort] = React.useState("reco");
    const [scope, setScope] = React.useState("all");
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 26 }}>
        <div>
          <div className="lbl">Tabs</div>
          <Tabs value={tab} onChange={setTab} items={[
            { value: "applied", label: "지원 현황", count: 12 },
            { value: "saved", label: "저장", count: 34 },
            { value: "viewed", label: "최근 본 공고" },
          ]} />
        </div>
        <div>
          <div className="lbl">Segmented Control</div>
          <div style={{ display: "flex", gap: 16, alignItems: "center", flexWrap: "wrap" }}>
            <SegmentedControl value={sort} onChange={setSort} items={[
              { value: "reco", label: "추천순" },
              { value: "new", label: "최신순" },
            ]} />
            <SegmentedControl size="sm" value={scope} onChange={setScope} items={[
              { value: "all", label: "전체" },
              { value: "ing", label: "진행중" },
              { value: "end", label: "마감" },
            ]} />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
