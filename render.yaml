# Render Blueprint — 이음(E-UM) 백엔드(FastAPI) 배포
# 대시보드 → New → Blueprint → 이 레포 선택 시 자동 인식.
# 비밀값(sync: false)은 배포 후 Render 대시보드 Environment 에서 직접 입력한다.
services:
  - type: web
    name: eum-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: PYTHONIOENCODING
        value: "utf-8"
      # --- 비밀: 대시보드에서 입력 (.env 값과 동일) ---
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET            # HS256 하위호환용(ES256은 JWKS로 자동 검증)
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LEGACY_ENCRYPTION_KEY          # 환경 간 동일 유지(암호화 데이터 복호화)
        sync: false
